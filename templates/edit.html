<!DOCTYPE html>
<html>
<head>
    <title>Edit Student</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h1>Edit Student</h1>

    <form method="POST" class="mt-3">

        <div class="mb-3">
            <label>Name</label>
            <input type="text" name="name" class="form-control" value="{{ student[1] }}">
        </div>

        <div class="mb-3">
            <label>Age</label>
            <input type="number" name="age" class="form-control" value="{{ student[2] }}">
        </div>

        <div class="mb-3">
            <label>Course</label>
            <input type="text" name="course" class="form-control" value="{{ student[3] }}">
        </div>

        <button type="submit" class="btn btn-warning">Update</button>
    </form>

    <a href="/" class="btn btn-secondary mt-3">Back</a>

</div>

</body>
</html>
